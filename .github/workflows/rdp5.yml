name: Free Windows RDP via Ngrok

on:  
  workflow_dispatch:

jobs:  
  build:    
    runs-on: windows-latest    
    timeout-minutes: 360    

    steps:      
      # 1. تثبيت أداة Ngrok عبر مدير الحزم Choco
      - name: Install Ngrok via Chocolatey        
        shell: powershell        
        run: |          
          choco install ngrok -y

      # 2. إعداد الـ RDP وتغيير كلمة مرور المستخدم لتسجيل الدخول
      - name: Enable RDP and Setup User        
        shell: powershell        
        run: |          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0          
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"          
          
          $Password = ConvertTo-SecureString "GitHubRDP@2026" -AsPlainText -Force          
          Set-LocalUser -Name "runneradmin" -Password $Password

# 3. تفعيل النفق والربط بـ Ngrok لتوجيه منفذ الـ RDP (3389)
      - name: Connect Ngrok Tunnel        
        shell: powershell        
        run: |          
          # حفظ مفتاح التوثيق
          & ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
          
          # تشغيل Ngrok داخل جوب منفصل ومستقل في الخلفية لضمان عدم إغلاقه
          Start-Job -ScriptBlock { & ngrok tcp 3389 --log=stdout }
          
          # الانتظار 15 ثانية كاملة لضمان بدء الخدمة وتوليد الرابط
          Start-Sleep -Seconds 15
          
          # محاولة جلب الرابط من الـ API المحلي لـ Ngrok
          try {
              $Response = Invoke-WebRequest -Uri "http://127.0.0.1:4040/api/tunnels" -UseBasicParsing -TimeoutSec 15
              $Url = ($Response | ConvertFrom-Json).tunnels.public_url
              
              if ($null -eq $Url -or $Url -eq "") { throw "Tunnel URL is empty" }
              
              Write-Host "=========================================" -ForegroundColor Green
              Write-Host "RDP Address: $Url" -ForegroundColor Green
              Write-Host "Username: runneradmin" -ForegroundColor Green
              Write-Host "Password: GitHubRDP@2026" -ForegroundColor Green
              Write-Host "=========================================" -ForegroundColor Green
          }
          catch {
              Write-Host "=========================================" -ForegroundColor Red
              Write-Host "[Error] Failed to connect to Ngrok API." -ForegroundColor Red
              Write-Host "Please check if your Ngrok account is active or free limit reached." -ForegroundColor Red
              Write-Host "=========================================" -ForegroundColor Red
              exit 1
          }
