name: Free Windows RDP v4 (No Ngrok)

on:  
  workflow_dispatch:

jobs:  
  build:    
    runs-on: windows-latest    
    timeout-minutes: 360    

    steps:      
      # 1. إعداد الـ RDP وتغيير كلمة مرور المستخدم لتسجيل الدخول
      - name: Enable RDP and Setup User        
        shell: powershell        
        run: |          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0          
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"          
          
          $Password = ConvertTo-SecureString "GitHubRDP@2026" -AsPlainText -Force          
          Set-LocalUser -Name "runneradmin" -Password $Password

      # 2. إنشاء النفق والربط عبر أداة Pinggy فائقة السرعة (بدون حسابات ولا توكن)
      - name: Start Alternative Tunnel and Display Link        
        shell: powershell        
        run: |          
          Write-Host "Creating secure tunnel, please wait..." -ForegroundColor Yellow
          
          # تشغيل النفق عبر SSH المدمج في الويندوز وتوجيه مخرجات الرابط لملف مؤقت لقرائته
          Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 443:127.0.0.1:3389 a.pinggy.io" -RedirectStandardOutput "$env:TEMP\tunnel.log"
          
          # الانتظار 10 ثوانٍ ليتولد الرابط من السيرفر
          Start-Sleep -Seconds 10
          
          # قراءة الرابط من ملف السجل وطباعته
          $LogContent = Get-Content "$env:TEMP\tunnel.log" -Raw
          
          # استخراج الرابط المولد للـ RDP
          if ($LogContent -match "tcp://([^:\s]+):([0-9]+)") {
              $Server = $Matches[1]
              $Port = $Matches[2]
              $FullAddress = "$Server:$Port"
              
              Write-Host "==========================================================" -ForegroundColor Green
              Write-Host "🎉 Tunnel Created Successfully without Ngrok!" -ForegroundColor Green
              Write-Host "==========================================================" -ForegroundColor Green
              Write-Host "RDP Address : $FullAddress" -ForegroundColor Cyan
              Write-Host "Username    : runneradmin" -ForegroundColor Cyan
              Write-Host "Password    : GitHubRDP@2026" -ForegroundColor Cyan
              Write-Host "==========================================================" -ForegroundColor Green
          } else {
              # حل بديل إذا تأخر الـ Log الأول: طباعة السجل كاملاً للبحث عن الرابط يدوياً
              Write-Host "==========================================================" -ForegroundColor Yellow
              Write-Host "Check the output log below to find your connection string:" -ForegroundColor Yellow
              Write-Host "==========================================================" -ForegroundColor Yellow
              Get-Content "$env:TEMP\tunnel.log"
          }

      # 3. الحفاظ على بقاء السيرفر حياً ونشطاً طوال الـ 6 ساعات دون إغلاق
      - name: Keep Alive Loop        
        shell: powershell        
        run: |          
          $hours = 6          
          for ($i = 0; $i -lt ($hours * 60); $i++) {              
              Start-Sleep -Seconds 60          
          }
