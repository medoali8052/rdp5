name: Free Windows RDP via Ngrok

on:  
  workflow_dispatch:

jobs:  
  build:    
    runs-on: windows-latest    
    timeout-minutes: 360    

    steps:      
      # 1. تثبيت أداة Ngrok عبر مدير الحزم Choco
      - name: Install Ngrok via Chocolatey        
        shell: powershell        
        run: |          
          choco install ngrok -y

      # 2. إعداد الـ RDP وتغيير كلمة مرور المستخدم لتسجيل الدخول
      - name: Enable RDP and Setup User        
        shell: powershell        
        run: |          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0          
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"          
          
          $Password = ConvertTo-SecureString "GitHubRDP@2026" -AsPlainText -Force          
          Set-LocalUser -Name "runneradmin" -Password $Password

      # 3. تفعيل النفق والربط بـ Ngrok لتوجيه منفذ الـ RDP (3389)
      - name: Connect Ngrok Tunnel        
        shell: powershell        
        env:          
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}        
        run: |          
          # إعداد مفتاح التوثيق
          ngrok config add-authtoken $env:NGROK_AUTH_TOKEN
          
          # تشغيل النفق في الخلفية لتوجيه بروتوكول الـ RDP (TCP منفذ 3389)
          Start-Process ngrok -ArgumentList "tcp 3389"
          
          # الانتظار لثوانٍ حتى يتم الاتصال وتوليد الرابط
          Start-Sleep -Seconds 5
          
          # استخراج الرابط الخارجي المولد وعرضه في الـ Logs لتتمكن من الاتصال به
          $Url = (Invoke-WebRequest -Uri "http://127.0.0.1:4040/api/tunnels" -UseBasicParsing | ConvertFrom-Json).tunnels.public_url
          Write-Host "=========================================" -ForegroundColor Green
          Write-Host "RDP Address: $Url" -ForegroundColor Green
          Write-Host "Username: runneradmin" -ForegroundColor Green
          Write-Host "Password: GitHubRDP@2026" -ForegroundColor Green
          Write-Host "=========================================" -ForegroundColor Green

      # 4. الحفاظ على تشغيل السيرفر وعدم إغلاقه فوراً
      - name: Keep Alive Loop        
        shell: powershell        
        run: |          
          $hours = 6          
          for ($i = 0; $i -lt ($hours * 60); $i++) {              
              Start-Sleep -Seconds 60          
          }
