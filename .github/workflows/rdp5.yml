name: Free Windows RDP via Ngrok

on:  
  workflow_dispatch:

jobs:  
  build:    
    runs-on: windows-latest    
    timeout-minutes: 360    

    steps:      
      # 1. تثبيت أداة Ngrok عبر مدير الحزم Choco
      - name: Install Ngrok via Chocolatey        
        shell: powershell        
        run: |          
          choco install ngrok -y

      # 2. إعداد الـ RDP وتغيير كلمة مرور المستخدم لتسجيل الدخول
      - name: Enable RDP and Setup User        
        shell: powershell        
        run: |          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0          
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"          
          
          $Password = ConvertTo-SecureString "GitHubRDP@2026" -AsPlainText -Force          
          Set-LocalUser -Name "runneradmin" -Password $Password

      # 3. ربط الحساب وتشغيل النفق مباشرة في الواجهة للحفاظ على تشغيل السيرفر
      - name: Start Ngrok Tunnel and Keep Alive        
        shell: powershell        
        run: |          
          # حفظ مفتاح التوثيق الخاص بكِ
          & ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
          
          Write-Host "==========================================================" -ForegroundColor Green
          Write-Host "للحصول على رابط الـ RDP الخاص بكِ، يرجى فتح حسابك في موقع ngrok:" -ForegroundColor Yellow
          Write-Host "https://dashboard.ngrok.com/tunnels/agents" -ForegroundColor Cyon
          Write-Host "ستجدين الرابط هناك في قائمة الـ Tunnels النشطة مباشرة!" -ForegroundColor Yellow
          Write-Host "==========================================================" -ForegroundColor Green
          Write-Host "Username: runneradmin" -ForegroundColor Green
          Write-Host "Password: GitHubRDP@2026" -ForegroundColor Green
          Write-Host "==========================================================" -ForegroundColor Green
          
          # تشغيل النفق مباشرة ليبقى السيرفر يعمل بشكل دائم ومستقر
          & ngrok tcp 3389
